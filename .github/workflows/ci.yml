name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded PR runs; never cancel a main/deploy run mid-flight.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # The merge gate: type-check + unit tests + E2E against an ephemeral local Supabase stack
  # (isolated per run, migrations applied from scratch — no shared-DB races between parallel PRs).
  gate:
    runs-on: ubuntu-latest
    env:
      CI_REPORTER_TOKEN: ci-local-reporter-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci

      - name: Type-check
        run: npm run check

      - name: Unit tests
        run: npm test

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Configure local Edge Function env
        run: printf 'REPORTER_TOKEN=%s\nCURRENT_CAMP=CI\n' "$CI_REPORTER_TOKEN" > supabase/functions/.env

      - name: Start local Supabase (applies migrations + seed, serves functions)
        run: supabase start

      - name: Export local Supabase config for the build
        run: |
          API_URL=$(supabase status -o json | jq -r '.API_URL')
          ANON=$(supabase status -o json | jq -r '.ANON_KEY')
          {
            echo "PUBLIC_SUPABASE_URL=$API_URL"
            echo "PUBLIC_SUPABASE_ANON_KEY=$ANON"
            echo "PUBLIC_REPORTER_TOKEN=$CI_REPORTER_TOKEN"
          } >> "$GITHUB_ENV"

      - name: Build (local env, baked into the SPA for E2E)
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E (reporter flow incl. offline outbox)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Path-based human gate for the tiered-merge model. A PR that touches any CODEOWNERS path is
  # "high-risk" and this required check FAILS unless a code owner has approved it — so it can only
  # land via an admin merge (enforce_admins is off). PRs that touch no owned path pass instantly and
  # stay eligible for 0-review auto-merge. This is what actually enforces the tiers: GitHub does NOT
  # honor `require_code_owner_reviews` while `required_approving_review_count` is 0 (our config, so
  # low-risk PRs need no review), which left the code-owner requirement a no-op. CODEOWNERS is the
  # single source of truth — the matcher below reads it (anchored-prefix + exact-file patterns).
  codeowner-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Parse CODEOWNERS into {pattern, owners[]} entries (skip comments/blanks).
            const entries = fs.readFileSync('.github/CODEOWNERS', 'utf8')
              .split('\n').map((l) => l.trim())
              .filter((l) => l && !l.startsWith('#'))
              .map((l) => { const p = l.split(/\s+/); return { pattern: p[0], owners: p.slice(1) }; });

            // The subset of CODEOWNERS syntax this repo uses: root-anchored dir prefixes ("/foo/")
            // and exact files ("/foo/bar.ts"). Returns true if `file` is owned by `pattern`.
            const matches = (file, pattern) => {
              let p = pattern.startsWith('/') ? pattern.slice(1) : pattern;
              if (p.endsWith('/')) return file === p.slice(0, -1) || file.startsWith(p);
              return file === p || file.startsWith(p + '/');
            };

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.issue.number, per_page: 100,
            });

            const owners = new Set();
            const hits = [];
            for (const f of files.map((x) => x.filename)) {
              for (const e of entries) {
                if (matches(f, e.pattern)) {
                  hits.push(f);
                  e.owners.forEach((o) => owners.add(o.replace(/^@/, '').toLowerCase()));
                }
              }
            }

            if (hits.length === 0) {
              core.info('No code-owned (high-risk) paths touched — gate passes; eligible for auto-merge.');
              return;
            }
            const ownerList = [...owners].map((o) => '@' + o).join(', ');
            core.notice(`High-risk paths touched (owner: ${ownerList}):\n${[...new Set(hits)].map((h) => '  - ' + h).join('\n')}`);

            // Latest decisive review per user (ignore COMMENTED/PENDING, per GitHub's own semantics).
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.issue.number, per_page: 100,
            });
            const latest = new Map();
            for (const r of reviews) {
              if (!r.user || r.state === 'COMMENTED' || r.state === 'PENDING') continue;
              latest.set(r.user.login.toLowerCase(), r.state);
            }
            const approved = [...owners].some((o) => latest.get(o) === 'APPROVED');
            if (approved) {
              core.info('Approved by a code owner — gate passes.');
              return;
            }
            core.setFailed(
              `High-risk paths require a code-owner approval (${ownerList}). None found. ` +
              `A code owner must approve, or a repo admin can merge via the admin override.`
            );

  # Per-PR preview on Cloudflare Pages, backed by the staging Supabase project.
  deploy-preview:
    needs: gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci

      - name: Build (staging env)
        env:
          PUBLIC_SUPABASE_URL: ${{ vars.STAGING_PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ vars.STAGING_PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_REPORTER_TOKEN: ${{ secrets.STAGING_PUBLIC_REPORTER_TOKEN }}
        run: npm run build

      - name: Deploy preview to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy build --project-name=zelt --branch="pr-${{ github.event.number }}" --commit-dirty=true

      - name: Comment preview URL on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://pr-${context.issue.number}.zelt.pages.dev`;
            const marker = '<!-- zelt-preview-url -->';
            const body = `${marker}\n🚀 **Preview deployed:** ${url}\n\n_Backed by the **staging** Supabase project (not prod)._`;
            const { data: comments } = await github.rest.issues.listComments({ ...context.repo, issue_number: context.issue.number });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }

  # Production deploy on merge to main: migrate + redeploy functions to staging (keeps the preview
  # backend current) and prod, then ship the prod-configured SPA to Cloudflare Pages.
  deploy-prod:
    needs: gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Migrate + deploy functions to staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
          supabase db push --yes
          supabase functions deploy melden --project-ref ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
          supabase functions deploy zelt-info --project-ref ${{ vars.SUPABASE_STAGING_PROJECT_REF }}

      - name: Migrate + deploy functions to prod
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ vars.SUPABASE_PROD_PROJECT_REF }}
          supabase db push --yes
          supabase functions deploy melden --project-ref ${{ vars.SUPABASE_PROD_PROJECT_REF }}
          supabase functions deploy zelt-info --project-ref ${{ vars.SUPABASE_PROD_PROJECT_REF }}

      - name: Build (prod env)
        env:
          PUBLIC_SUPABASE_URL: ${{ vars.PROD_PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ vars.PROD_PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_REPORTER_TOKEN: ${{ secrets.PROD_PUBLIC_REPORTER_TOKEN }}
        run: npm run build

      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy build --project-name=zelt --branch=main --commit-dirty=true
